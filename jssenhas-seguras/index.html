<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de senha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="conteudo">
        <div class="conteudo-titulo">
            <img src="unlock.svg" alt="cadeado fechado">
            <h2 class="titulo-principal">Gerador de senhas</h2>
            <h3 class="titulo-secundario">Gere instantaneamente uma senha aleatória e segura</h3>
        </div>
        <div class="conteudo-senha">
            <label for="senha">Senha</label>
            <input name="senha" type="text" id="campo-senha">
        </div>
        <div class="parametro">
            <h3 class="parametro-titulo">Personalize sua senha</h3>
            <div class="parametro-coluna__senha">
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Número de caracteres</h4>
                    <div class="parametro-senha-botoes">
                        <button id="diminuir-tamanho" class="parametro-senha__botao" type="button">-</button>
                        <p id="tamanho-senha" class="parametro-senha__texto">12</p>
                        <button id="aumentar-tamanho" class="parametro-senha__botao" type="button">+</button>
                    </div>
                </div>
                <div class="parametro-senha parametro-senha--opcoes">
                    <h4 class="parametro-senha__titulo">Caracteres</h4>
                    <label><input id="incluir-maiusculas" type="checkbox" checked> Maiúsculas</label>
                    <label><input id="incluir-minusculas" type="checkbox" checked> Minúsculas</label>
                    <label><input id="incluir-numeros" type="checkbox" checked> Números</label>
                    <label><input id="incluir-simbolos" type="checkbox" checked> Símbolos</label>
                </div>
                <div class="parametro-senha parametro-senha--forca">
                    <h4 class="parametro-senha__titulo">Força da senha</h4>
                    <p id="forca-senha">Moderada</p>
                </div>
            </div>
            <div class="parametro-gerar">
                <button id="gerar-senha" type="button">Gerar senha</button>
                <button id="copiar-senha" type="button">Copiar</button>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
